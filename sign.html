<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cancas Studio — Sign Your Agreement</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<style>
  :root{--teal:#0E7C92;--dark:#1A1A1A;--grey:#5A5A5A;--light:#EAF6F9;--border:#e3e3e3;}
  *{box-sizing:border-box;}
  body{font-family:Arial,Helvetica,sans-serif;color:var(--dark);margin:0;background:#f6f8f9;}
  header{background:#fff;border-bottom:1px solid var(--border);padding:16px 22px;text-align:center;}
  .logo{font-size:22px;font-weight:800;} .logo span{color:var(--teal);}
  .logo small{display:block;font-size:10px;color:var(--grey);letter-spacing:1px;text-transform:uppercase;font-weight:600;}
  .wrap{max-width:640px;margin:22px auto;padding:0 16px;}
  .card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:22px;margin-bottom:18px;}
  h2{font-size:15px;color:var(--teal);margin:0 0 12px;border-bottom:2px solid var(--teal);padding-bottom:6px;}
  .kv{width:100%;border-collapse:collapse;font-size:14px;}
  .kv td{border:1px solid var(--border);padding:7px 10px;} .kv td.k{background:var(--light);font-weight:700;width:45%;}
  label{display:block;font-size:12px;font-weight:700;color:var(--grey);margin:12px 0 4px;text-transform:uppercase;letter-spacing:.4px;}
  input{width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:7px;font-size:14px;background:#fbfcfc;}
  input:focus{outline:none;border-color:var(--teal);}
  .padwrap{border:1.5px dashed var(--teal);border-radius:8px;background:#fff;margin-top:6px;}
  canvas{width:100%;height:170px;display:block;touch-action:none;border-radius:8px;}
  .btns{display:flex;gap:12px;flex-wrap:wrap;margin-top:14px;}
  button{border:none;border-radius:8px;padding:13px 20px;font-size:14px;font-weight:800;cursor:pointer;}
  .primary{background:var(--teal);color:#fff;} .dark{background:var(--dark);color:#fff;} .ghost{background:#fff;color:var(--grey);border:2px solid var(--border);}
  .hint{font-size:13px;color:var(--grey);margin-top:8px;line-height:1.5;}
  .done{display:none;background:var(--light);border:1px solid var(--teal);border-radius:8px;padding:14px;margin-top:14px;}
  .err{color:#b00;font-weight:700;}
</style>
</head>
<body>
<header>
  <div class="logo">CANCAS <span>STUDIO</span><small>Service Agreement · Please review &amp; sign</small></div>
</header>

<div class="wrap" id="app">
  <div class="card" id="summaryCard">
    <h2>Your Agreement Summary</h2>
    <table class="kv" id="summary"></table>
    <div class="btns"><button class="ghost" onclick="previewPdf()">👁 Preview full agreement (PDF)</button></div>
    <div class="hint">The full Terms &amp; Conditions apply and are available at cancasstudio.com. By signing you agree to them.</div>
  </div>

  <div class="card">
    <h2>Sign Here</h2>
    <label>Full Name</label><input id="sigName" placeholder="Your full name">
    <label>Title / Position</label><input id="sigTitle" placeholder="e.g. Managing Director">
    <label>Signature (draw below)</label>
    <div class="padwrap"><canvas id="pad"></canvas></div>
    <div class="btns">
      <button class="ghost" onclick="clearPad()">Clear</button>
      <button class="primary" onclick="signDownload()">✍ Sign &amp; Download Signed Agreement</button>
    </div>
    <div class="done" id="done">
      <b>✅ Signed PDF downloaded.</b>
      <div class="hint">Final step: email the downloaded file back to us so we can begin work.</div>
      <div class="btns"><button class="dark" id="mailBtn">✉ Email it back to Cancas Studio</button></div>
    </div>
  </div>
</div>

<script>
var TEAL="#0E7C92",DARK="#1A1A1A",GREY="#5A5A5A",LIGHT="#EAF6F9";
function money(n){var v=Number(n||0);return v.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});}
function splitDefaults(d){var total=Number(d.total||0);var deposit=(d.deposit!=null&&d.deposit!=="")?Number(d.deposit):Math.round(total*50)/100;var balance=(d.balance!=null&&d.balance!=="")?Number(d.balance):(total-deposit);return{total:total,deposit:deposit,balance:balance,monthly:Number(d.monthly||0)};}
function grid(){return{hLineWidth:function(){return .5;},vLineWidth:function(){return .5;},hLineColor:function(){return"#cccccc";},vLineColor:function(){return"#cccccc";},paddingLeft:function(){return 7;},paddingRight:function(){return 7;},paddingTop:function(){return 5;},paddingBottom:function(){return 5;}};}
function brandHeader(r){return{columns:[{text:[{text:"CANCAS ",bold:true,color:DARK},{text:"STUDIO",bold:true,color:TEAL}],fontSize:20},{text:r||"",alignment:"right",bold:true,color:TEAL,fontSize:20,margin:[0,2,0,0]}]};}
function footer(){return function(){return{text:"CANCAS STUDIO · hello@cancasstudio.com · +971 56 901 6046",alignment:"center",color:GREY,fontSize:7.5,margin:[0,8,0,0]};};}
function kv(k,v){return[{text:k,bold:true,fillColor:LIGHT},{text:v}];}
function h2p(t){return{text:t,color:TEAL,bold:true,fontSize:12,margin:[0,12,0,4]};}
function buildAgreementDoc(d,sig){var s=splitDefaults(d);var sb;if(sig&&sig.dataUrl){sb=[{text:"FOR THE CLIENT — "+(d.clientName||"[Client Company]"),color:TEAL,bold:true,margin:[0,10,0,6]},{image:sig.dataUrl,width:150,margin:[0,0,0,2]},{canvas:[{type:"line",x1:0,y1:0,x2:200,y2:0,lineWidth:.5,lineColor:"#999"}]},{text:"Signature",color:GREY,fontSize:8,margin:[0,1,0,8]},{text:[{text:"Name: ",bold:true},(sig.name||"")]},{text:[{text:"Title / Position: ",bold:true},(sig.title||"")]},{text:[{text:"Date: ",bold:true},(sig.date||"")]},{text:"Signed electronically via Cancas Studio.",color:GREY,fontSize:8,italics:true,margin:[0,6,0,0]}];}else{sb=[{text:"FOR THE CLIENT — "+(d.clientName||"[Client Company]"),color:TEAL,bold:true,margin:[0,10,0,10]},{text:"Signature: ______________________________________",margin:[0,0,0,10]},{text:"Name: __________________________________________",margin:[0,0,0,10]},{text:"Title / Position: _________________________________",margin:[0,0,0,10]},{text:"Company Stamp & Date: __________________________"}];}return{pageSize:"A4",pageMargins:[40,44,40,46],defaultStyle:{fontSize:10,color:DARK,lineHeight:1.2},footer:footer(),content:[brandHeader(""),{text:"Web Design & Development · Dubai, UAE",color:GREY,fontSize:8,characterSpacing:.5,margin:[0,1,0,8]},{text:"WEBSITE DESIGN & DEVELOPMENT SERVICE AGREEMENT",bold:true,fontSize:13,alignment:"center"},{text:"This Agreement is made on "+(d.agreementDate||"____ / ____ / ____"),alignment:"center",color:GREY,italics:true,margin:[0,2,0,10]},{text:"This Service Agreement is entered into between:"},{text:[{text:"The Studio: ",bold:true},"CANCAS STUDIO, Dubai, UAE."],margin:[0,3,0,0]},{text:[{text:"The Client: ",bold:true},(d.clientName||"[Client Company]")+(d.clientLocation?", "+d.clientLocation:"")+"."]},h2p("1.  Key Terms at a Glance"),{table:{widths:[150,"*"],body:[kv("Package",d.packageName||"[Package]"),kv("One-Time Build Fee","AED "+money(s.total)),kv("Managed Monthly Plan","AED "+money(s.monthly)+" / month"),kv("Advance Deposit (50%)","AED "+money(s.deposit)+" — payable on signing"),kv("Balance (50%)","AED "+money(s.balance)+" — after final approval, before launch"),kv("Monthly Billing Starts","One month from the advance payment date"),kv("Domain & Hosting","Domain provided by the Client; hosting by Cancas Studio"),kv("Estimated Delivery","Approx. 14 days from deposit + all required content")]},layout:grid()},h2p("2.  Payment Schedule"),{ul:["50% advance — AED "+money(s.deposit)+" — due on signing. Work begins once received.","50% balance — AED "+money(s.balance)+" — due after final approval, before launch.","Managed monthly plan — AED "+money(s.monthly)+"/month — first payment one month after the advance date."]},{text:"The 50% deposit is non-refundable once work has commenced.",color:GREY,fontSize:9,margin:[0,3,0,0]},h2p("3.  Key Terms You Should Know"),{ul:["Deposit & balance: 50% deposit non-refundable once work starts; balance due before launch.","Monthly plan: hosting, SSL, monitoring, 6 updates/month, support. Cancel any time with 30 days' written notice.","Domain: provided and owned by the Client; Client gives DNS access and keeps it registered/renewed.","Revisions: unlimited during build (within agreed scope); new pages/features quoted separately.","Your part: provide content & approvals promptly (approve mockups within 7 business days).","Ownership: full custom code/design transfers on full & final payment; Studio may show work in portfolio unless asked not to.","Non-payment/cancellation: services stop and the site may go offline within 7 days; files transfer free within 7 business days.","Liability limited to fees paid in the prior 3 months. Governed by UAE law; Dubai courts."]},{table:{widths:["*"],body:[[{text:"Please review the full Terms & Conditions at cancasstudio.com before signing. This summary highlights the main points only; the full T&C govern this Agreement.",bold:true,fillColor:LIGHT}]]},layout:{hLineColor:function(){return TEAL;},vLineColor:function(){return TEAL;},hLineWidth:function(){return 1;},vLineWidth:function(){return 1;},paddingLeft:function(){return 8;},paddingRight:function(){return 8;},paddingTop:function(){return 6;},paddingBottom:function(){return 6;}},margin:[0,10,0,0]},h2p("4.  Acceptance & Signature"),{text:"By signing below, the Client agrees to this Agreement and the full Terms & Conditions of CANCAS STUDIO, and authorises work to begin on receipt of the 50% advance."},{stack:sb,margin:[0,4,0,0]}]};}

/* ---------- load client data from link ---------- */
var DATA=null, AGR_ID=null;
var SB_URL="https://dfckurqjlqhprdsrorvw.supabase.co", SB_KEY="sb_publishable_wYiqkV5i85UqwoszcpnBxA_8nPxWX-v";
function sbClient(){ try{ return (window.supabase&&supabase.createClient)?supabase.createClient(SB_URL,SB_KEY):null; }catch(e){ return null; } }
function linkError(msg){ document.getElementById("app").innerHTML='<div class="card"><h2>Link problem</h2><p class="err">'+msg+'</p></div>'; }

function renderSummary(){
  if(!DATA){linkError("This signing link is missing its details. Please ask Cancas Studio to resend the link.");return;}
  var s=splitDefaults(DATA);
  var rows=[["Client",DATA.clientName||"—"],["Package",DATA.packageName||"—"],["Total",("AED "+money(s.total))],["Deposit (50%)",("AED "+money(s.deposit)+" — due on signing")],["Balance (50%)",("AED "+money(s.balance))],["Monthly Plan",("AED "+money(s.monthly)+" / month")]];
  document.getElementById("summary").innerHTML=rows.map(function(r){return "<tr><td class='k'>"+r[0]+"</td><td>"+r[1]+"</td></tr>";}).join("");
}

function loadData(){
  var qs=new URLSearchParams(location.search||"");
  var id=qs.get("id");
  if(id){
    AGR_ID=id;
    var sb=sbClient();
    if(!sb){ linkError("Could not connect. Please refresh the page and try again."); return; }
    sb.rpc("get_agreement",{p_id:id}).then(function(res){
      var row=res&&res.data&&res.data[0];
      if((res&&res.error)||!row){ linkError("This agreement could not be found. Please ask Cancas Studio to resend the link."); return; }
      DATA=row.data;
      if(row.status==="signed"){ showThankYou(); return; }   // already signed — don't show the form again
      renderSummary();
    },function(){ linkError("Could not load the agreement. Please refresh and try again."); });
    return;
  }
  // Legacy: data embedded in the link hash (#d=...)
  try{ var h=location.hash||""; var m=h.match(/d=([^&]+)/); if(m){ DATA=JSON.parse(decodeURIComponent(escape(atob(decodeURIComponent(m[1]))))); } }catch(e){ DATA=null; }
  renderSummary();
}
loadData();

function previewPdf(){ if(DATA) pdfMake.createPdf(buildAgreementDoc(DATA,null)).open(); }

// Replace the whole page with a welcome/confirmation (shown after signing, or if already signed)
function showThankYou(){
  document.getElementById("app").innerHTML=
    '<div class="card" style="text-align:center;padding:38px 22px;">'
    +'<div style="font-size:46px;line-height:1;margin-bottom:12px;">✅</div>'
    +'<div style="color:var(--teal);font-weight:800;font-size:21px;margin-bottom:10px;">Thank you &amp; welcome to Cancas Studio!</div>'
    +'<p style="font-size:15px;color:var(--dark);margin:0 0 8px;">We’ve received your signed agreement. Our team will be in touch shortly to get started on your project.</p>'
    +'<p style="font-size:13px;color:var(--grey);margin:0;">A copy has been downloaded to your device for your records.</p>'
    +'</div>';
  try{ window.scrollTo(0,0); }catch(e){}
}

/* ---------- signature pad ---------- */
var canvas=document.getElementById("pad"),ctx=canvas.getContext("2d"),drawing=false,dirty=false;
function fit(){var r=canvas.getBoundingClientRect();var dpr=window.devicePixelRatio||1;canvas.width=r.width*dpr;canvas.height=r.height*dpr;ctx.scale(dpr,dpr);ctx.lineWidth=2.2;ctx.lineJoin="round";ctx.lineCap="round";ctx.strokeStyle="#12303a";}
setTimeout(fit,50);window.addEventListener("resize",function(){var img=canvas.toDataURL();fit();});
function pos(e){var r=canvas.getBoundingClientRect();var t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top};}
function start(e){drawing=true;dirty=true;var p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);e.preventDefault();}
function move(e){if(!drawing)return;var p=pos(e);ctx.lineTo(p.x,p.y);ctx.stroke();e.preventDefault();}
function end(){drawing=false;}
canvas.addEventListener("mousedown",start);canvas.addEventListener("mousemove",move);window.addEventListener("mouseup",end);
canvas.addEventListener("touchstart",start,{passive:false});canvas.addEventListener("touchmove",move,{passive:false});canvas.addEventListener("touchend",end);
function clearPad(){ctx.clearRect(0,0,canvas.width,canvas.height);dirty=false;}

function signDownload(){
  if(!DATA){alert("Link problem — please ask for a new link.");return;}
  var name=document.getElementById("sigName").value.trim();
  var title=document.getElementById("sigTitle").value.trim();
  if(!name){alert("Please type your full name.");return;}
  if(!dirty){alert("Please draw your signature.");return;}
  var sig={dataUrl:canvas.toDataURL("image/png"),name:name,title:title,date:new Date().toLocaleDateString("en-GB")};
  var fname=("Cancas-Agreement-SIGNED-"+(DATA.clientName||"Client")).replace(/[^\w.\-]+/g,"-")+".pdf";
  pdfMake.createPdf(buildAgreementDoc(DATA,sig)).download(fname);
  // Always save the signed agreement to Cancas Studio's database.
  var sb=sbClient();
  if(sb){
    try{
      if(AGR_ID){ sb.rpc("sign_agreement",{p_id:AGR_ID,p_name:name,p_title:title,p_sig:sig.dataUrl}).then(function(){},function(){}); }
      else { sb.rpc("submit_signed_agreement",{p_data:DATA,p_name:name,p_title:title,p_sig:sig.dataUrl}).then(function(){},function(){}); }
    }catch(e){}
  }
  showThankYou();
}
</script>
</body>
</html>
